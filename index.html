<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cables Training</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/header.css">
  <script src="/icons.js"></script>
  <script src="/header.js" defer></script>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="theme-color" content="#f5a623">
  <style>
    :root { --bg:#0f1117; --surface:#181c27; --card:#1e2333; --border:#2a3050; --accent:#f5a623; --text:#e8ecf4; --muted:#a8b4cc; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }
    header { background:var(--surface); border-bottom:3px solid var(--accent); padding:14px 18px 12px; }
    .badge { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:3px; }
    header h1 { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; letter-spacing:1px; text-transform:uppercase; line-height:1; }
    .wrap { max-width:860px; margin:0 auto; padding:28px 18px; }
    .section-label { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:14px; }
    .section-label + .section-label { margin-top:32px; }
    .tiles { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin-bottom:28px; }
    .tile { display:flex; align-items:center; gap:16px; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:22px 20px; text-decoration:none; color:var(--text); cursor:pointer; transition:border-color .15s, transform .1s; }
    .tile:hover { border-color:var(--accent); }
    .tile:active { transform:scale(.99); }
    .tile.soon { opacity:.5; cursor:default; }
    .tile.soon:hover { border-color:var(--border); }
    .tile-icon { width:46px; height:46px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:rgba(245,166,35,.13); color:var(--accent); flex-shrink:0; }
    .tile-icon svg { width:24px; height:24px; }
    .tile-label { font-family:'Barlow Condensed',sans-serif; font-size:21px; font-weight:800; letter-spacing:1px; text-transform:uppercase; line-height:1; }
    .tile-sub { font-size:14px; color:var(--muted); margin-top:4px; }
  </style>
</head>
<body style="visibility:hidden">
<header>
  <div class="badge">Kennecott Mine · Cables Training</div>
  <h1>Cables Training</h1>
</header>

<div class="wrap">
  <div class="section-label">Training</div>
  <div class="tiles">
    <a class="tile" href="training.html">
      <div class="tile-icon"><span data-icon="book"></span></div>
      <div>
        <div class="tile-label">Training Material</div>
        <div class="tile-sub">Cable handling procedures</div>
      </div>
    </a>
  </div>

  <div class="section-label">Reporting</div>
  <div class="tiles">
    <a class="tile" href="damage-report.html">
      <div class="tile-icon"><span data-icon="bolt"></span></div>
      <div>
        <div class="tile-label">Damage Reports</div>
        <div class="tile-sub">Log &amp; track cable damage</div>
      </div>
    </a>
    <a class="tile" id="manageTile" href="manage.html" style="display:none">
      <div class="tile-icon"><span data-icon="tool"></span></div>
      <div>
        <div class="tile-label">Management</div>
        <div class="tile-sub">All reports &amp; analytics</div>
      </div>
    </a>
  </div>
</div>

<script>
(async function () {
  var EXP_MS = 30 * 24 * 60 * 60 * 1000;
  var token = localStorage.getItem('kt_token');

  function reveal(perm) {
    perm = perm || {};
    var sa = perm.superadmin || perm.admin;
    var cb = perm.cables || {};
    function show(id, on) { var t = document.getElementById(id); if (t) t.style.display = on ? '' : 'none'; }
    show('manageTile', !!(sa || cb.manage));
    document.body.style.visibility = 'visible';
  }
  function deny() {
    localStorage.removeItem('cb_ok'); localStorage.removeItem('cb_ok_exp');
    window.location.replace('signin.html');
  }
  if (!token) return deny();
  try {
    var r = await fetch('https://www.kennecotttrainers.com/auth/me', { headers: { Authorization: 'Bearer ' + token } });
    if (r.ok) {
      var p = (await r.json()).permissions || {};
      if (p.superadmin || p.admin || (p.cables && p.cables.access)) {
        localStorage.setItem('cb_ok', '1');
        localStorage.setItem('cb_ok_exp', Date.now() + EXP_MS);
        localStorage.setItem('cb_perm', JSON.stringify(p));
        return reveal(p);
      }
      return deny();
    }
    if (r.status === 401 || r.status === 403) return deny();
    throw new Error('offline');
  } catch (e) {
    var ok = localStorage.getItem('cb_ok') === '1';
    var exp = parseInt(localStorage.getItem('cb_ok_exp') || '0', 10);
    if (ok && Date.now() < exp) {
      try { reveal(JSON.parse(localStorage.getItem('cb_perm') || '{}')); } catch (_) { reveal({}); }
    } else { deny(); }
  }
})();
</script>
</body>
</html>
