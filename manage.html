<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Management — Cables Training</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/header.css">
  <script src="/header.js" defer></script>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="theme-color" content="#f5a623">
  <style>
    :root { --bg:#0f1117; --surface:#181c27; --card:#1e2333; --border:#2a3050; --accent:#f5a623; --text:#e8ecf4; --muted:#a8b4cc; --error:#ef4444; --green:#22c55e; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }
    header { background:var(--surface); border-bottom:3px solid var(--accent); padding:14px 18px 12px; }
    .badge { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:3px; }
    header h1 { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; letter-spacing:1px; text-transform:uppercase; line-height:1; }

    /* ── Hub tiles ──────────────────────────────────────── */
    .hub { max-width:860px; margin:0 auto; padding:36px 18px; }
    .hub-tiles { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .hub-tile { display:flex; align-items:center; gap:18px; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:28px 24px; text-decoration:none; color:var(--text); cursor:pointer; transition:border-color .15s, transform .1s; }
    .hub-tile:hover { border-color:var(--accent); }
    .hub-tile:active { transform:scale(.99); }
    .hub-icon { font-size:38px; flex-shrink:0; }
    .hub-label { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; letter-spacing:1px; text-transform:uppercase; line-height:1; }
    .hub-sub { font-size:14px; color:var(--muted); margin-top:5px; }

    /* ── Back bar ───────────────────────────────────────── */
    .back-bar { padding:10px 18px; background:var(--surface); border-bottom:1px solid var(--border); }
    .back-btn { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); background:none; border:none; cursor:pointer; padding:4px 0; }
    .back-btn:hover { color:var(--accent); }

    /* ── Report list + detail ──────────────────────────── */
    .layout { display:flex; height:calc(100vh - 56px - 39px); overflow:hidden; }
    .sidebar { width:320px; min-width:260px; background:var(--surface); border-right:1.5px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
    .sidebar-head { padding:14px 16px 10px; border-bottom:1px solid var(--border); }
    .sidebar-head h2 { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; letter-spacing:1px; text-transform:uppercase; }
    .sidebar-head .count { font-size:13px; color:var(--muted); margin-top:2px; }
    .report-list { flex:1; overflow-y:auto; }
    .report-item { padding:14px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    .report-item:hover { background:var(--card); }
    .report-item.active { background:var(--card); border-left:3px solid var(--accent); }
    .ri-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .ri-id { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800; letter-spacing:.5px; }
    .ri-status { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; border-radius:4px; }
    .ri-status.draft { background:rgba(168,180,204,.15); color:var(--muted); }
    .ri-status.reported { background:rgba(245,166,35,.15); color:var(--accent); }
    .ri-status.inspected { background:rgba(59,130,246,.15); color:#3b82f6; }
    .ri-status.repaired { background:rgba(34,197,94,.15); color:var(--green); }
    .ri-meta { font-size:13px; color:var(--muted); }
    .ri-reporter { font-size:12px; color:var(--muted); margin-top:2px; }

    .main { flex:1; overflow-y:auto; padding:28px 32px; }
    .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--muted); text-align:center; gap:12px; }
    .empty-state .icon { font-size:48px; }
    .empty-state .msg { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }

    .detail-card { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; }
    .detail-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:16px; color:var(--accent); }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
    .detail-field { display:flex; flex-direction:column; gap:3px; }
    .detail-field.full { grid-column:1/-1; }
    .detail-field label { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    .detail-field .val { font-size:15px; line-height:1.5; }
    .detail-field .val.empty { color:var(--muted); font-style:italic; }
    .detail-field textarea { background:var(--card); border:1.5px solid var(--border); border-radius:6px; color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; padding:10px 12px; outline:none; min-height:60px; resize:vertical; }
    .detail-field textarea:focus { border-color:var(--accent); }
    .detail-field input { background:var(--card); border:1.5px solid var(--border); border-radius:6px; color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; padding:10px 12px; outline:none; }
    .detail-field input:focus { border-color:var(--accent); }

    .status-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .status-pill { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:800; letter-spacing:1px; text-transform:uppercase; padding:6px 14px; border-radius:6px; }
    .workflow-btns { display:flex; gap:8px; margin-left:auto; }
    .wf-btn { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800; letter-spacing:1px; text-transform:uppercase; padding:8px 16px; border-radius:6px; border:1.5px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; }
    .wf-btn:hover { border-color:var(--accent); }
    .wf-btn.primary { background:var(--accent); color:#000; border-color:var(--accent); }

    .photos { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
    .thumb { width:200px; border-radius:8px; overflow:hidden; border:1.5px solid var(--border); }
    .thumb img { width:200px; height:150px; object-fit:cover; display:block; cursor:pointer; }
    .photo-lightbox { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; cursor:zoom-out; }
    .photo-lightbox img { max-width:92vw; max-height:92vh; border-radius:8px; }

    .save-status { font-size:13px; color:var(--muted); padding:4px 0; margin-bottom:12px; }
    .save-status.err { color:var(--error); }

    /* ── Costs view ────────────────────────────────────── */
    .costs-wrap { max-width:900px; margin:0 auto; padding:28px 18px; }
    .costs-total { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:24px 28px; margin-bottom:24px; display:flex; align-items:center; gap:20px; }
    .costs-total .year-label { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
    .costs-total .year-val { font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:800; color:var(--accent); letter-spacing:1px; }
    .costs-total .year-count { font-size:14px; color:var(--muted); margin-left:auto; }
    .costs-table { width:100%; border-collapse:collapse; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
    .costs-table th { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); text-align:left; padding:12px 14px; border-bottom:2px solid var(--border); background:var(--card); }
    .costs-table td { padding:10px 14px; font-size:14px; border-bottom:1px solid var(--border); }
    .costs-table tr:last-child td { border-bottom:none; }
    .costs-table tr:hover td { background:var(--card); }
    .cost-val { font-weight:600; }
    .cost-none { color:var(--muted); font-style:italic; }

    /* ── Personnel view ────────────────────────────────── */
    .personnel-wrap { max-width:900px; margin:0 auto; padding:28px 18px; }
    .add-bar { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:24px; }
    .add-bar label { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; display:block; margin-bottom:10px; }
    .add-bar .search-row { display:flex; gap:10px; position:relative; }
    .add-bar input { flex:1; background:var(--card); border:1.5px solid var(--border); border-radius:6px; color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; padding:10px 14px; outline:none; }
    .add-bar input:focus { border-color:var(--accent); }
    .search-results { position:absolute; top:100%; left:0; right:80px; background:var(--card); border:1.5px solid var(--border); border-radius:0 0 8px 8px; max-height:240px; overflow-y:auto; z-index:100; }
    .search-results:empty { display:none; }
    .sr-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); font-size:14px; display:flex; justify-content:space-between; align-items:center; }
    .sr-item:hover { background:var(--surface); }
    .sr-item:last-child { border-bottom:none; }
    .sr-name { font-weight:600; }
    .sr-detail { font-size:12px; color:var(--muted); }
    .sr-already { font-size:11px; color:var(--green); font-weight:700; text-transform:uppercase; letter-spacing:1px; }
    .roster-table { width:100%; border-collapse:collapse; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
    .roster-table th { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); text-align:left; padding:12px 14px; border-bottom:2px solid var(--border); background:var(--card); }
    .roster-table td { padding:10px 14px; font-size:14px; border-bottom:1px solid var(--border); }
    .roster-table tr:last-child td { border-bottom:none; }
    .roster-table tr:hover td { background:var(--card); }
    .roster-count { font-size:14px; color:var(--muted); margin-bottom:12px; }
    .remove-btn { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--error); background:none; border:1.5px solid var(--error); border-radius:4px; padding:4px 10px; cursor:pointer; opacity:.7; }
    .remove-btn:hover { opacity:1; }

    .view { display:none; }
    .view.active { display:block; }
    .view-reports.active { display:flex; }

    @media (max-width:700px) {
      .layout { flex-direction:column; height:auto; }
      .sidebar { width:100%; max-height:40vh; border-right:none; border-bottom:1.5px solid var(--border); }
      .main { padding:20px 16px; }
      .detail-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="badge">Kennecott Mine · Cables Training</div>
  <h1>Management</h1>
</header>

<!-- Hub (default) -->
<div class="view active" id="viewHub">
  <div class="hub">
    <div class="hub-tiles">
      <div class="hub-tile" onclick="showView('reports')">
        <div class="hub-icon">⚡</div>
        <div>
          <div class="hub-label">Damage Reports</div>
          <div class="hub-sub">View, manage &amp; track cable damage</div>
        </div>
      </div>
      <div class="hub-tile" onclick="showView('costs')">
        <div class="hub-icon">💰</div>
        <div>
          <div class="hub-label">Repair Costs</div>
          <div class="hub-sub">Cost summary &amp; year-to-date total</div>
        </div>
      </div>
      <div class="hub-tile" onclick="showView('personnel')">
        <div class="hub-icon">👷</div>
        <div>
          <div class="hub-label">Personnel</div>
          <div class="hub-sub">Manage cable operator access</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Reports view -->
<div class="view view-reports" id="viewReports">
  <div class="back-bar"><button class="back-btn" onclick="showView('hub')">&larr; Back to Management</button></div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-head">
        <h2>Damage Reports</h2>
        <div class="count" id="listCount"></div>
      </div>
      <div class="report-list" id="reportList"></div>
    </div>
    <div class="main" id="main">
      <div class="empty-state">
        <div class="icon">🛠️</div>
        <div class="msg">Select a damage report</div>
      </div>
    </div>
  </div>
</div>

<!-- Personnel view -->
<div class="view" id="viewPersonnel">
  <div class="back-bar"><button class="back-btn" onclick="showView('hub')">&larr; Back to Management</button></div>
  <div class="personnel-wrap">
    <div class="add-bar">
      <label>Add Cable Operator</label>
      <div class="search-row">
        <input type="text" id="personnelSearch" placeholder="Search by name or payroll number…" oninput="searchEmployees(this.value)" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div class="roster-count" id="rosterCount"></div>
    <div id="rosterBody"></div>
  </div>
</div>

<!-- Costs view -->
<div class="view" id="viewCosts">
  <div class="back-bar"><button class="back-btn" onclick="showView('hub')">&larr; Back to Management</button></div>
  <div class="costs-wrap" id="costsBody"></div>
</div>

<script>
var SB_URL  = 'https://uudbjkfnmahuhgqejxfx.supabase.co';
var SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1ZGJqa2ZubWFodWhncWVqeGZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTU0NzAsImV4cCI6MjA4Nzc3MTQ3MH0.iYJwcME6wKdBucbJgAprXx8s5HOL1NcbKbaNvlfL4zQ';
var HEADERS = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY };
var AUTH_BASE = 'https://www.kennecotttrainers.com';
var TOKEN = localStorage.getItem('kt_token') || '';

var STATUS_LABELS = { draft:'Draft', reported:'Reported' };

var reports = [];
var cur = null;
var userName = '';
var saveTimer = null;

function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '—';
  var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(d));
  if (m) return (+m[2]) + '/' + (+m[3]) + '/' + m[1];
  var dt = new Date(d); if (isNaN(dt)) return esc(d);
  return dt.toLocaleDateString('en-US', { month:'numeric', day:'numeric', year:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '—';
  var dt = new Date(d); if (isNaN(dt)) return esc(d);
  return dt.toLocaleDateString('en-US', { month:'numeric', day:'numeric', year:'numeric' }) + ' ' +
         dt.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}
function fmtMoney(v) {
  var n = parseFloat(v);
  if (isNaN(n)) return null;
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

// ── Views ──────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(function(el) { el.classList.remove('active'); });
  var el = document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1));
  if (el) el.classList.add('active');
  if (name === 'costs') renderCosts();
  if (name === 'personnel') loadRoster();
}

// ── Auth ──────────────────────────────────────────────
(async function init() {
  if (!TOKEN) { window.location.replace('signin.html'); return; }
  try {
    var r = await fetch(AUTH_BASE + '/auth/me', { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (!r.ok) { window.location.replace('signin.html'); return; }
    var me = await r.json();
    var p = me.permissions || {};
    var ok = p.superadmin || p.admin || (p.cables && p.cables.manage);
    if (!ok) { window.location.replace('index.html'); return; }
    userName = me.name || '';
    await loadReports();
  } catch (e) {
    window.location.replace('signin.html');
  }
})();

// ── Data ──────────────────────────────────────────────
async function loadReports() {
  try {
    var res = await fetch(SB_URL + '/rest/v1/cable_damage_reports?deleted_at=is.null&select=*&order=report_date.desc.nullsfirst,created_at.desc&limit=500', { headers: HEADERS });
    if (res.ok) reports = await res.json();
  } catch (e) {}
  renderList();
}

// ── Sidebar list ──────────────────────────────────────
function renderList() {
  document.getElementById('listCount').textContent = reports.length + ' report' + (reports.length === 1 ? '' : 's');
  var list = document.getElementById('reportList');
  list.innerHTML = reports.map(function(r) {
    return '<div class="report-item' + (cur && cur.id===r.id ? ' active' : '') + '" onclick="selectReport(\'' + r.id + '\')">' +
      '<div class="ri-top"><span class="ri-id">' + esc(r.cable_id || 'No Cable ID') + '</span><span class="ri-status ' + r.status + '">' + (STATUS_LABELS[r.status]||r.status) + '</span></div>' +
      '<div class="ri-meta">' + esc(r.damage_type||'—') + ' · ' + fmtDate(r.report_date) + '</div>' +
      '<div class="ri-reporter">Reporter: ' + esc(r.reporter_name||'—') + '</div>' +
    '</div>';
  }).join('');
}

function selectReport(id) {
  cur = reports.find(function(r) { return r.id === id; }) || null;
  renderList();
  renderDetail();
}

// ── Detail view ───────────────────────────────────────
function renderDetail() {
  var m = document.getElementById('main');
  if (!cur) {
    m.innerHTML = '<div class="empty-state"><div class="icon">🛠️</div><div class="msg">Select a damage report</div></div>';
    return;
  }
  var r = cur;
  var html = '';

  html += '<div class="status-bar">' +
    '<span class="status-pill ri-status ' + r.status + '">' + (STATUS_LABELS[r.status]||r.status) + '</span>' +
    '<span style="font-size:13px;color:var(--muted)">Updated ' + fmtDate(r.updated_at) + '</span>' +
    '<div class="workflow-btns" id="wfBtns"></div></div>';
  html += '<div id="saveStatus" class="save-status"></div>';

  // Reporter info
  html += '<div class="detail-card"><div class="detail-title">Reporter Information</div><div class="detail-grid">' +
    field('Name', r.reporter_name) + field('Payroll #', r.reporter_payroll) + field('Contact Phone', r.contact_phone) +
    '</div></div>';

  // Report details (read-only)
  html += '<div class="detail-card"><div class="detail-title">Report Details</div><div class="detail-grid">' +
    field('Cable ID', r.cable_id) + field('Report Date', fmtDate(r.report_date)) +
    field('Date & Time Occurred', r.occurrence_datetime ? fmtDateTime(r.occurrence_datetime) : null) +
    field('Damage Type', r.damage_type) + field('Equipment Type', r.location) + field('Equipment Number', r.equipment_number) +
    field('Description', r.description, true) +
    '</div>';
  if (r.photos && r.photos.length) {
    html += '<div class="detail-field full" style="margin-top:14px"><label>Photos (' + r.photos.length + ')</label><div class="photos">' +
      r.photos.map(function(p) { return '<div class="thumb"><img src="' + (p.url||p.dataURL||'') + '" onclick="lightbox(this.src)"></div>'; }).join('') +
      '</div></div>';
  }
  html += '</div>';

  // Repair
  html += '<div class="detail-card"><div class="detail-title">Repair</div><div class="detail-grid">';
  if (r.status === 'reported') {
    html += editField('Estimated Cost', 'estimated_cost', r.estimated_cost) +
            editField('PO #', 'po_number', r.po_number) +
            editField('Repair Date', 'repair_date', r.repair_date, 'date') +
            '<div class="detail-field full"><label>Repair Notes</label><textarea oninput="upd(\'repair_notes\',this.value)">' + esc(r.repair_notes||'') + '</textarea></div>';
  } else {
    html += field('Estimated Cost', r.estimated_cost) + field('PO #', r.po_number) +
            field('Repair Date', fmtDate(r.repair_date)) + field('Repair Notes', r.repair_notes, true);
  }
  html += '</div></div>';

  m.innerHTML = html;
  renderWorkflowBtns();
}

function field(lbl, val, full) {
  var cls = val ? '' : ' empty';
  return '<div class="detail-field' + (full ? ' full' : '') + '"><label>' + lbl + '</label><div class="val' + cls + '">' + esc(val || '—') + '</div></div>';
}

function editField(lbl, key, val, type) {
  return '<div class="detail-field"><label>' + lbl + '</label><input type="' + (type||'text') + '" value="' + esc(val||'') + '" oninput="upd(\'' + key + '\',this.value)"></div>';
}

function renderWorkflowBtns() {
  var w = document.getElementById('wfBtns');
  if (!w || !cur) return;
  var s = cur.status;
  var btns = '';
  btns += '<button class="wf-btn" onclick="advance(\'draft\')">Reopen for Edits</button>';
  if (s === 'reported')  btns += '<button class="wf-btn primary" onclick="advance(\'repaired\')">Mark Repaired</button>';
  btns += '<button class="wf-btn" onclick="printReport()">Print / PDF</button>';
  btns += '<button class="wf-btn" style="color:var(--error);border-color:var(--error)" onclick="deleteReport()">Delete</button>';
  w.innerHTML = btns;
}

function advance(next) {
  if (!cur) return;
  cur.status = next;
  save();
  renderDetail();
  renderList();
}

function upd(key, val) {
  if (!cur) return;
  cur[key] = val;
  clearTimeout(saveTimer);
  setStatus('Saving…');
  saveTimer = setTimeout(function() { save(); }, 800);
}

async function save() {
  if (!cur) return;
  cur.updated_at = new Date().toISOString();
  try {
    var payload = Object.assign({}, cur);
    ['report_date','inspect_date','repair_date','closed_date','occurrence_datetime'].forEach(function(k) { if (payload[k] === '') payload[k] = null; });
    var res = await fetch(SB_URL + '/rest/v1/cable_damage_reports?id=eq.' + cur.id, {
      method: 'PATCH',
      headers: Object.assign({}, HEADERS, { 'Content-Type': 'application/json', Prefer: 'return=minimal' }),
      body: JSON.stringify(payload)
    });
    if (res.ok) setStatus('Saved ✓');
    else setStatus('Save failed', true);
  } catch (e) { setStatus('Network error', true); }
}

function setStatus(msg, isErr) {
  var el = document.getElementById('saveStatus');
  if (el) { el.textContent = msg; el.className = 'save-status' + (isErr ? ' err' : ''); }
}

function lightbox(src) {
  var lb = document.createElement('div'); lb.className = 'photo-lightbox';
  lb.innerHTML = '<img src="' + src + '">';
  lb.onclick = function() { lb.remove(); };
  document.body.appendChild(lb);
}

// ── Costs view ────────────────────────────────────────
function renderCosts() {
  var body = document.getElementById('costsBody');
  var year = new Date().getFullYear();
  var yearReports = reports.filter(function(r) {
    var d = r.report_date || r.created_at || '';
    return String(d).slice(0,4) === String(year);
  });

  var total = 0;
  var countWithCost = 0;
  yearReports.forEach(function(r) {
    var n = parseFloat(r.estimated_cost);
    if (!isNaN(n)) { total += n; countWithCost++; }
  });

  var html = '';
  html += '<div class="costs-total">' +
    '<div><div class="year-label">' + year + ' Year-to-Date Total</div>' +
    '<div class="year-val">' + fmtMoney(total) + '</div></div>' +
    '<div class="year-count">' + countWithCost + ' of ' + yearReports.length + ' reports with costs</div>' +
    '</div>';

  html += '<table class="costs-table"><thead><tr>' +
    '<th>Cable ID</th><th>Date</th><th>Damage Type</th><th>Equipment</th><th>Estimated Cost</th><th>PO #</th><th>Status</th>' +
    '</tr></thead><tbody>';

  yearReports.forEach(function(r) {
    var cost = fmtMoney(r.estimated_cost);
    html += '<tr>' +
      '<td style="font-weight:700">' + esc(r.cable_id || '—') + '</td>' +
      '<td>' + fmtDate(r.report_date) + '</td>' +
      '<td>' + esc(r.damage_type || '—') + '</td>' +
      '<td>' + esc([r.location, r.equipment_number].filter(Boolean).join(' — ') || '—') + '</td>' +
      '<td class="' + (cost ? 'cost-val' : 'cost-none') + '">' + (cost || 'Not entered') + '</td>' +
      '<td>' + esc(r.po_number || '—') + '</td>' +
      '<td><span class="ri-status ' + r.status + '">' + (STATUS_LABELS[r.status]||r.status) + '</span></td>' +
      '</tr>';
  });

  if (!yearReports.length) {
    html += '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">No reports for ' + year + '</td></tr>';
  }

  html += '</tbody></table>';
  body.innerHTML = html;
}

// ── Personnel view ─────────────────────────────────────
var roster = [];
var searchTimer = null;

async function loadRoster() {
  try {
    var res = await fetch(SB_URL + '/rest/v1/kw_users?permissions-%3Ecables-%3E%3Eaccess=eq.true&select=display_name,payroll,business_title,site,team&order=display_name.asc&limit=500', { headers: HEADERS });
    if (res.ok) roster = await res.json();
  } catch (e) {}
  renderRoster();
}

function renderRoster() {
  document.getElementById('rosterCount').textContent = roster.length + ' cable operator' + (roster.length === 1 ? '' : 's');
  var html = '<table class="roster-table"><thead><tr><th>Name</th><th>Payroll</th><th>Title</th><th>Site</th><th>Team</th><th></th></tr></thead><tbody>';
  roster.forEach(function(u) {
    html += '<tr>' +
      '<td style="font-weight:700">' + esc(u.display_name || '—') + '</td>' +
      '<td>' + esc(u.payroll || '—') + '</td>' +
      '<td>' + esc(u.business_title || '—') + '</td>' +
      '<td>' + esc(u.site || '—') + '</td>' +
      '<td>' + esc(u.team || '—') + '</td>' +
      '<td style="text-align:right"><button class="remove-btn" onclick="revokeAccess(\'' + esc(u.payroll) + '\',\'' + esc(u.display_name).replace(/'/g,"\\'") + '\')">Remove</button></td>' +
      '</tr>';
  });
  if (!roster.length) html += '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No cable operators added yet</td></tr>';
  html += '</tbody></table>';
  document.getElementById('rosterBody').innerHTML = html;
}

function searchEmployees(q) {
  clearTimeout(searchTimer);
  q = q.trim();
  var box = document.getElementById('searchResults');
  if (q.length < 2) { box.innerHTML = ''; return; }
  searchTimer = setTimeout(async function() {
    try {
      var isNum = /^\d+$/.test(q);
      var url;
      if (isNum) {
        url = SB_URL + '/rest/v1/kw_users?payroll=eq.' + encodeURIComponent(q) + '&select=display_name,payroll,business_title,permissions&limit=10';
      } else {
        url = SB_URL + '/rest/v1/kw_users?display_name=ilike.*' + encodeURIComponent(q) + '*&select=display_name,payroll,business_title,permissions&order=display_name.asc&limit=10';
      }
      var res = await fetch(url, { headers: HEADERS });
      if (!res.ok) return;
      var rows = await res.json();
      box.innerHTML = rows.map(function(u) {
        var hasCables = u.permissions && u.permissions.cables && u.permissions.cables.access;
        return '<div class="sr-item" onclick="grantAccess(\'' + esc(u.payroll) + '\')">' +
          '<div><span class="sr-name">' + esc(u.display_name) + '</span> <span class="sr-detail">' + esc(u.payroll) + '</span>' +
          (u.business_title ? '<br><span class="sr-detail">' + esc(u.business_title) + '</span>' : '') +
          '</div>' +
          (hasCables ? '<span class="sr-already">Already added</span>' : '') +
          '</div>';
      }).join('');
      if (!rows.length) box.innerHTML = '<div class="sr-item" style="color:var(--muted)">No employees found</div>';
    } catch (e) {}
  }, 300);
}

document.addEventListener('click', function(e) {
  var box = document.getElementById('searchResults');
  if (box && !e.target.closest('.search-row')) box.innerHTML = '';
});

async function grantAccess(payroll) {
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('personnelSearch').value = '';
  try {
    var res = await fetch(AUTH_BASE + '/auth/cables-grant', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
      body: JSON.stringify({ payroll: payroll, access: true })
    });
    var data = await res.json();
    if (!res.ok) { alert(data.error || 'Failed to grant access'); return; }
    await loadRoster();
  } catch (e) { alert('Network error'); }
}

async function revokeAccess(payroll, name) {
  if (!confirm('Remove cables access for ' + name + '?')) return;
  try {
    var res = await fetch(AUTH_BASE + '/auth/cables-grant', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
      body: JSON.stringify({ payroll: payroll, access: false })
    });
    var data = await res.json();
    if (!res.ok) { alert(data.error || 'Failed to revoke access'); return; }
    await loadRoster();
  } catch (e) { alert('Network error'); }
}

function printReport() {
  if (!cur) return;
  var r = cur;
  var row = function(lbl, val) { return '<tr><td class="lbl">' + esc(lbl) + '</td><td>' + esc(val || '—') + '</td></tr>'; };
  var section = function(title) { return '<tr><td colspan="2" class="sec">' + esc(title) + '</td></tr>'; };

  var rows = '';
  rows += section('Reporter Information');
  rows += row('Name', r.reporter_name);
  rows += row('Payroll #', r.reporter_payroll);
  rows += row('Contact Phone', r.contact_phone);

  rows += section('Report Details');
  rows += row('Cable ID', r.cable_id);
  rows += row('Report Date', fmtDate(r.report_date));
  rows += row('Date & Time Occurred', r.occurrence_datetime ? fmtDateTime(r.occurrence_datetime) : null);
  rows += row('Damage Type', r.damage_type);
  rows += row('Equipment Type', r.location);
  rows += row('Equipment Number', r.equipment_number);
  rows += row('Description', r.description);

  rows += section('Repair');
  rows += row('Status', STATUS_LABELS[r.status] || r.status);
  rows += row('Estimated Cost', r.estimated_cost);
  rows += row('PO #', r.po_number);
  rows += row('Repair Date', fmtDate(r.repair_date));
  rows += row('Repair Notes', r.repair_notes);

  var photos = '';
  if (r.photos && r.photos.length) {
    photos = '<div class="photo-section"><div class="sec-inline">Photos</div><div class="photo-grid">';
    r.photos.forEach(function(p) {
      var src = p.url || p.dataURL || '';
      if (src) photos += '<img src="' + src + '">';
    });
    photos += '</div></div>';
  }

  var title = 'Cable Damage Report' + (r.cable_id ? ' — ' + r.cable_id : '');
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + esc(title) + '</title>' +
    '<style>' +
    'body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 32px 40px; color: #1a1a1a; font-size: 13px; }' +
    '.header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #f5a623; padding-bottom: 12px; margin-bottom: 20px; }' +
    '.header .kicker { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #f5a623; font-weight: 700; margin-bottom: 2px; }' +
    '.header h1 { font-size: 22px; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: .5px; }' +
    '.header .meta { text-align: right; font-size: 11px; color: #666; }' +
    'table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }' +
    'td { padding: 5px 10px; vertical-align: top; border-bottom: 1px solid #e5e5e5; }' +
    '.lbl { width: 160px; font-weight: 700; color: #555; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; }' +
    '.sec { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #f5a623; padding-top: 16px; border-bottom: 2px solid #f5a623; }' +
    '.photo-section { margin-top: 16px; }' +
    '.sec-inline { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #f5a623; border-bottom: 2px solid #f5a623; padding-bottom: 4px; margin-bottom: 10px; }' +
    '.photo-grid { display: flex; flex-wrap: wrap; gap: 10px; }' +
    '.photo-grid img { width: 220px; height: 165px; object-fit: cover; border: 1px solid #ccc; border-radius: 4px; }' +
    '@media print { body { padding: 20px; } .photo-grid img { break-inside: avoid; } }' +
    '</style></head><body>' +
    '<div class="header"><div><div class="kicker">Kennecott Mine · Cables Training</div><h1>Cable Damage Report</h1></div>' +
    '<div class="meta">Cable ID: <strong>' + esc(r.cable_id || '—') + '</strong><br>Printed: ' + new Date().toLocaleDateString('en-US') + '</div></div>' +
    '<table>' + rows + '</table>' +
    photos +
    '</body></html>';

  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  w.onload = function() { w.print(); };
}

async function deleteReport() {
  if (!cur) return;
  var label = cur.cable_id || 'this report';
  if (!confirm('Delete "' + label + '"?\n\nThis can be recovered from the admin Deleted Records page.')) return;
  try {
    var res = await fetch(SB_URL + '/rest/v1/cable_damage_reports?id=eq.' + cur.id, {
      method: 'PATCH',
      headers: Object.assign({}, HEADERS, { 'Content-Type': 'application/json', Prefer: 'return=minimal' }),
      body: JSON.stringify({ deleted_at: new Date().toISOString() })
    });
    if (res.ok) {
      reports = reports.filter(function(r) { return r.id !== cur.id; });
      cur = null;
      renderList();
      renderDetail();
    } else { alert('Delete failed — try again.'); }
  } catch (e) { alert('Network error — check connection.'); }
}
